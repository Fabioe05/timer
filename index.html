<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Timer</title>
</head>

<body>

    <div class="container">
        <h2>Cuenta Regresiva</h2>
        <input type="number" id="count" min="0" max="60" placeholder="Tiempo">
        <div class="count" id="display">
            <h1>00</h1>
        </div>

        <img id="rocket" src="./assets/359279.gif" alt="Cohete despegando">

        <div class="controls">
            <button id="boton-inicio">Iniciar</button>
            <button id="boton-reinicio">Reinicio</button>
        </div>


        <footer class="main-footer">
            <p>Desarrollado por
                <a href="https://github.com/Fabioe05/timer" target="_blank">Fabio Espinoza</a>
            </p>
        </footer>

    </div>

</body>
<script src="index.js"></script>

</html>
